slam_toolbox:
  ros__parameters:
    # Plugin params (без изменений)
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters (твои)
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint    # ✅ Правильно!
    scan_topic: /scan
    use_map_saver: true
    mode: mapping                 # ✅ mapping (не localization)

    # КРИТИЧНЫЕ параметры для queue full:
    transform_timeout: 1.0        # Было 0.2 → 1.0! ✅
    tf_buffer_duration: 60.0      # Было 30.0 → 60.0! ✅
    transform_publish_period: 0.02
    map_update_interval: 5.0