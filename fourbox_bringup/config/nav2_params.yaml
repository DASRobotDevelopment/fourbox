amcl:
  ros__parameters:
    alpha2: 0.3
    alpha3: 0.3  
    alpha4: 0.3
    alpha5: 0.3
    base_frame_id: "base_footprint"
    laser_model_type: "likelihood_field"      # ✅ Обязательно!
    laser_max_range: 12.0                     # ✅ RPLIDAR!
    laser_min_range: 0.2                      # ✅ RPLIDAR!
    transform_tolerance: 1.0                   # ✅ TF фикс!

map_server:   # ✅ Обязательно!
  ros__parameters:
    yaml_filename: ""

controller_server:
  ros__parameters:
    controller_plugins: ["FollowPath"]
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.25
      max_linear_accel: 0.8
      max_angular_accel: 1.5
    general_goal_checker:
      xy_goal_tolerance: 0.1
      yaw_goal_tolerance: 0.1

local_costmap:   # ✅ Обязательно!
  ros__parameters:
    robot_base_frame: "base_link"
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    robot_radius: 0.22

global_costmap:  # ✅ Обязательно!
  ros__parameters:
    robot_base_frame: "base_link"
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    robot_radius: 0.22

planner_server:  # ✅ Обязательно!
  ros__parameters:
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
