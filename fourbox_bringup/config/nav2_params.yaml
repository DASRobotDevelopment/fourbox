amcl:
  ros__parameters:
    use_sim_time: false                    # default: false — Использовать симуляционное время (Gazebo)
    set_initial_pose: false                # default: false — Автоматически устанавливать начальную позу из RViz "2D Pose Estimate"
    alpha1: 0.2                            # default: 0.2 — Ошибка вращения от вращения (rad) — модель ошибок одометрии
    alpha2: 0.2                            # default: 0.2 — Ошибка вращения от поступательного движения (rad/m)
    alpha3: 0.2                            # default: 0.2 — Ошибка поступательного от поступательного (m)
    alpha4: 0.2                            # default: 0.2 — Ошибка поступательного от вращения (m/rad)
    alpha5: 0.2                            # default: 0.2 — Ошибка поступательного от масштаба (m/m)
    base_frame_id: "base_footprint"        # default: "base_footprint" — Фрейм робота на земле (для дифф-драйва)
    beam_skip_distance: 0.5                # default: 0.5 — Расстояние отклонения луча для пропуска (м)
    beam_skip_error_threshold: 0.9         # default: 0.9 — Порог ошибки для пропуска луча (0.0-1.0)
    beam_skip_threshold: 0.3               # default: 0.3 — Мин вероятность для пропуска луча
    do_beamskip: false                     # default: false — Пропускать лучи с большими ошибками
    global_frame_id: "map"                 # default: "map" — Фрейм статической карты
    lambda_short: 0.1                      # default: 0.1 — Экспоненциальное распределение коротких лучей
    laser_likelihood_max_dist: 2.0         # default: 2.0 — Макс расстояние сравнения со стеной (м)
    laser_max_range: 12.0                  # default: -1.0 — Максимальная дальность лидара (RPLIDAR A1) ✅ ЯВНО
    laser_min_range: 0.2                   # default: -1.0 — Минимальная дальность лидара ✅ ЯВНО
    laser_model_type: "likelihood_field"   # default: "beam" — Модель луча: likelihood_field(лучшая) ✅ УЛУЧШЕНО
    max_beams: 60                          # default: 60 — Количество лучей для анализа (быстрее)
    max_particles: 2000                    # default: 2000 — Максимум частиц (высокая точность)
    min_particles: 500                     # default: 500 — Минимум частиц (экономия CPU)
    odom_frame_id: "odom"                  # default: "odom" — Фрейм одометрии (с пробуксовкой)
    pf_err: 0.05                           # default: 0.05 — Точность KLD семплинга
    pf_z: 0.99                             # default: 0.99 — Доверительный интервал KLD (99%)
    recovery_alpha_fast: 0.0               # default: 0.0 — Быстрое восстановление (отключено)
    recovery_alpha_slow: 0.0               # default: 0.0 — Медленное восстановление (отключено)
    resample_interval: 1                   # default: 1 — Ресемплинг каждый кадр
    robot_model_type: "nav2_amcl::DifferentialMotionModel"  # default — Дифф-драйв модель
    save_pose_rate: 0.5                    # default: 0.5 — Сохранять позу каждые 0.5 сек
    sigma_hit: 0.2                         # default: 0.2 — Шум попадания луча в препятствие (м)
    tf_broadcast: true                     # default: true — Публиковать TF map→odom
    transform_tolerance: 1.0               # default: 0.2 — Допуск задержки TF (сек) ✅ УВЕЛИЧЕНО!
    update_min_a: 0.2                      # default: 0.2 — Мин угол поворота для обновления (~11°)
    update_min_d: 0.25                     # default: 0.25 — Мин расстояние для обновления (м)
    z_hit: 0.5                             # default: 0.5 — Доверие к попаданиям (0.5-0.95)
    z_max: 0.05                            # default: 0.05 — Случайные дальние показания
    z_rand: 0.5                            # default: 0.5 — Случайный шум
    z_short: 0.05                          # default: 0.05 — Случайные короткие показания
    scan_topic: "/scan"                    # default: "/scan" — Топик лидара

# -----------------------------------------------------------------------------
map_server:
  ros__parameters:
    yaml_filename: ""                      # default: "" — Пустая карта для SLAM Toolbox
    topic_name: "map"                      # default: "map" — Топик публикации карты
    introspection_mode: "disabled"          # default: "disabled" — Отключить отладку параметров

# -----------------------------------------------------------------------------
bt_navigator:
  ros__parameters:
    global_frame: "map"                    # default: "map" — Глобальный фрейм
    robot_base_frame: "base_link"          # default: "base_link" — Фрейм робота
    odom_topic: "/odom"                    # default: "/odom" — Топик одометрии
    bt_loop_duration: 10                   # default: 10 — Цикл Behavior Tree (мс)
    default_server_timeout: 20             # default: 20 — Таймаут сервера (сек)
    default_cancel_timeout: 50             # default: 50 — Таймаут отмены (сек)
    enable_groot_monitoring: false         # default: false — Отладка BT через Groot
    introspection_mode: "disabled"          # default: "disabled" — Отладка параметров
    follow_path_error_code: "FollowPath"   # default — Префикс ошибок FollowPath (фикс warning)
    compute_path_error_code: "ComputePathToPose"  # default — Префикс ошибок планирования (фикс warning)
    navigators: ["navigate_to_pose"]       # default — Доступные навигаторы
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"  # Jazzy: :: (не /)
    bt_search_directories:
      - "$env{HOME}/ros2_ws/install/nav2_bt_navigator/share/nav2_bt_navigator/behavior_trees"  # Пути к BT

# -----------------------------------------------------------------------------
controller_server:
  ros__parameters:
    controller_frequency: 20.0             # default: 20.0 — Частота контроллера (Гц)
    min_x_velocity_threshold: 0.001        # default: 0.001 — Мин скорость X
    min_y_velocity_threshold: 0.001        # default: 0.001 — Мин скорость Y
    min_theta_velocity_threshold: 0.001    # default: 0.001 — Мин угловая скорость
    failure_tolerance: 0.3                 # default: 0.3 — Допуск неудач (сек)
    robot_radius: 0.15
    progress_checker_plugins: ["progress_checker"]  # Плагины проверки прогресса
    goal_checker_plugins: ["general_goal_checker"]  # Плагины проверки цели
    controller_plugins: ["FollowPath"]     # Контроллеры траектории
    
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"  # default
      required_movement_radius: 0.5          # default: 0.5 — Мин расстояние движения (м)
      movement_time_allowance: 10.0          # default: 10.0 — Время на движение (сек)
    
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"  # default
      stateful: true                         # default: true — Сохранять состояние
      xy_goal_tolerance: 0.25                # default: 0.25 — Допуск X/Y (м)
      yaw_goal_tolerance: 0.25               # default: 0.25 — Допуск угла (рад)
    
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"  # Pure Pursuit
      desired_linear_vel: 0.25                # default: 0.25 — Желаемая скорость (м/с)
      max_linear_accel: 0.8                  # default: 2.0 — Линейное ускорение (м/с²) ✅ ПЛАВНЫЙ СТАРТ!
      max_angular_accel: 1.5                 # default: 3.2 — Угловое ускорение (рад/с²) ✅ ПЛАВНЫЙ ПОВОРОТ!
      min_angular_speed: 0.1                 # default: 0.1 — Мин угловая скорость
      max_angular_speed: 1.2                 # default: 1.2 — Макс угловая скорость
      rotational_lookahead_distance: 0.2     # default: 0.2 — Lookahead поворотов (м)
      lookahead_distance: 0.6                # default: 0.6 — Lookahead пути (м)
      use_interpolation: true                # default: true — Интерполяция пути
      transform_tolerance: 0.2               # default: 0.2 — Допуск TF ✅ УВЕЛИЧЕНО!

# -----------------------------------------------------------------------------
local_costmap:
  ros__parameters:
    update_frequency: 5.0                  # default: 5.0 — Частота обновления (Гц)
    publish_frequency: 2.0                 # default: 2.0 — Частота публикации (Гц)
    global_frame: "odom"                   # default: "odom" — Локальная карта в odom
    robot_base_frame: "base_link"          # default: "base_link"
    rolling_window: true                   # default: true — Окно следует за роботом
    width: 3.0                             # default: 3.0 — Ширина (м)
    height: 3.0                            # default: 3.0 — Высота (м)
    resolution: 0.05                       # default: 0.05 — Разрешение (м/ячейка)
    robot_radius: 0.15                     # default: 0.22 — Радиус робота (м)
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]  # Слои карты
    
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"  # default
      map_subscribe_transient_local: true     # default: true
    
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"  # default
      enabled: true
      observation_sources: scan
      scan:
        topic: "/scan"                       # default
        max_obstacle_height: 2.0              # default: 2.0
        clearing: true                       # default: true
        marking: true                        # default: true
        data_type: "LaserScan"               # default
        raytrace_max_range: 3.0              # default: 3.0
        obstacle_max_range: 2.5              # default: 2.5
    
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"  # default
      cost_scaling_factor: 3.0               # default: 3.0 — Скорость затухания
      inflation_radius: 0.7                  # default: 0.55 — Запретная зона (м)
    
    always_send_full_costmap: true          # default: false ✅ Полная карта для RViz
    transform_tolerance: 1.0                # default: 0.2 ✅ Фикс TF задержек!

# -----------------------------------------------------------------------------
global_costmap:
  ros__parameters:
    update_frequency: 1.0                  # default: 1.0 — Редкие обновления
    publish_frequency: 1.0                 # default: 1.0
    global_frame: "map"                    # default: "map"
    robot_base_frame: "base_link"          # default
    robot_radius: 0.22                     # default
    resolution: 0.05                       # default
    track_unknown_space: true              # default: true — Неизвестное пространство
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      map_subscribe_transient_local: true
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: true
      observation_sources: scan
      scan:
        topic: "/scan"
        max_obstacle_height: 2.0
        clearing: true
        marking: true
        data_type: "LaserScan"
        raytrace_max_range: 3.0
        obstacle_max_range: 2.5
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      cost_scaling_factor: 3.0
      inflation_radius: 0.7
    always_send_full_costmap: true          # default: false ✅ Для RViz
    transform_tolerance: 1.0                # default: 0.2 ✅ Фикс TF!

# -----------------------------------------------------------------------------
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0        # default: 20.0
    planner_plugins: ["GridBased"]          # default
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"  # Jazzy: :: (было /NavfnPlanner)
      tolerance: 0.5                         # default: 0.5 — Допуск к цели (м)
      use_astar: false                       # default: false — Dijkstra (не A*)
      allow_unknown: true                    # default: true — Через неизвестное
    open_container: true                    # Jazzy: lifecycle контейнер

# -----------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    cycle_frequency: 10.0                  # default: 10.0 — Восстановительные поведения
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    
    spin:
      plugin: "nav2_behaviors::Spin"        # Jazzy: :: (поворот на месте)
    backup:
      plugin: "nav2_behaviors::BackUp"      # Jazzy: :: (откат назад)
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"  # Jazzy: :: (по курсу)
    wait:
      plugin: "nav2_behaviors::Wait"        # Jazzy: :: (ожидание)
    
    local_frame: "odom"                     # default
    global_frame: "map"                     # default
    robot_base_frame: "base_link"           # default
    transform_tolerance: 1.0                # default: 0.2 ✅ Фикс TF